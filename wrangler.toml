name = "php-wasm-async-poc"
main = "worker/index.mjs"
compatibility_date = "2024-09-23"

# Local KV namespace for Session 6: real async host call demo.
# The binding name "KV" is accessed as env.KV inside the Worker.
# id/preview_id are required by wrangler schema validation; they are not
# used in local dev mode (wrangler dev --local uses miniflare's in-memory KV).
# Seed the key before testing: see docs/BUILD.md Session 6.
[[kv_namespaces]]
binding = "KV"
id = "local-dev-only"
preview_id = "local-dev-only"
